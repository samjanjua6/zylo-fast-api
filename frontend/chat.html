<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zylo — Chat</title>
  <meta name="description" content="Zylo AI Chat — real-time secure conversation over WebSocket." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/styles.css" />
</head>

<body class="chat-page">

  <div class="chat-layout">

    <!-- ── Top bar ── -->
    <header class="chat-topbar">
      <div class="topbar-brand">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Apna-chatbot</span>
        <span class="topbar-divider" aria-hidden="true"></span>
        <span class="topbar-label">AI Chat</span>
      </div>

      <div class="topbar-status" aria-live="polite" aria-atomic="true">
        <span id="ws-status-dot" class="ws-dot ws-dot--offline" aria-hidden="true"></span>
        <span id="ws-status-label" class="ws-status-label">Disconnected</span>
      </div>

      <div class="topbar-user">
        <div id="user-avatar" class="user-avatar" aria-hidden="true">?</div>
        <span id="username-display" class="username-display">…</span>
        <button id="logout-btn" class="btn-ghost-sm" type="button" title="Sign out">
          <!-- Logout icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign out
        </button>
      </div>
    </header>

    <!-- ── Messages area ── -->
    <main id="chat-messages" class="chat-main" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="chat-intro" id="chat-intro">
        <div class="bot-avatar-large" aria-hidden="true">🤖</div>
        <h1>Zylo AI Bot</h1>
        <p>Your authenticated assistant is ready. Say hello to get started!</p>
      </div>
    </main>

    <!-- ── Input bar ── -->
    <footer class="chat-footer">
      <form id="chat-form" class="chat-input-row" novalidate>
        <input id="chat-input" name="message" type="text" placeholder="Send a message…" autocomplete="off"
          maxlength="2000" aria-label="Message input" disabled />
        <button id="chat-send" class="btn-send" type="submit" aria-label="Send message" disabled>
          <!-- Send icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </form>
      <p class="chat-footer-note">Secured with JWT · Messages sent via WebSocket</p>
    </footer>

  </div>

  <script src="/frontend/chat.js"></script>
</body>

</html>
